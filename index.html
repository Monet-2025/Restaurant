<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monet Restaurant - Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e63946 0%, #d90429 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative curved lines */
        .curve-top, .curve-bottom {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: none;
        }

        .curve-top {
            top: -200px;
            right: -200px;
        }

        .curve-bottom {
            bottom: -200px;
            left: -200px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .restaurant-info h1 {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }

        .restaurant-info p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .menu-dots {
            display: flex;
            gap: 8px;
        }

        .menu-dots span {
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Main Menu Container */
        .menu-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        .dish-name {
            color: white;
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 60px;
            line-height: 1.3;
            text-align: center;
        }

        /* Image Carousel */
        .carousel {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .carousel-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .carousel-item.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .carousel-item.side {
            opacity: 0.6;
            transform: scale(0.9);
        }

        .dish-image {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .carousel-nav {
            position: absolute;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }

        .nav-arrow {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .bottom-icons {
            display: flex;
            gap: 15px;
        }

        .bottom-icons span {
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .bottom-icons span:hover {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dish-name {
                font-size: 28px;
            }

            .dish-image {
                width: 250px;
                height: 250px;
            }

            .carousel-item {
                padding: 20px;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dish-name, .carousel-item {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <!-- Decorative Curves -->
    <div class="curve-top"></div>
    <div class="curve-bottom"></div>

    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <div class="logo">🍽️</div>
            <div class="restaurant-info">
                <h1>Menu</h1>
                <p>July 9, 2026</p>
            </div>
        </div>
        <div class="menu-dots">
            <span>⋯</span>
            <span>✕</span>
        </div>
    </div>

    <!-- Main Menu -->
    <div class="menu-container">
        <h2 class="dish-name" id="dishName">Arishta with veal</h2>
        
        <div class="carousel">
            <button class="nav-arrow" onclick="changeDish(-1)">‹</button>
            
            <div class="carousel-item side">
                <img src="https://images.unsplash.com/photo-1551186970-9c98a5c5d70e?w=400&h=400&fit=crop" alt="Previous dish" class="dish-image">
            </div>
            
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1551186970-9c98a5c5d70e?w=600&h=600&fit=crop" alt="Current dish" class="dish-image" id="dishImage">
            </div>
            
            <div class="carousel-item side">
                <img src="https://images.unsplash.com/photo-1563379926898-05f4575a45d8?w=400&h=400&fit=crop" alt="Next dish" class="dish-image">
            </div>
            
            <button class="nav-arrow" onclick="changeDish(1)">›</button>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <input type="text" class="message-input" placeholder="Send message...">
        <div class="bottom-icons">
            <span>📱</span>
            <span>♡</span>
            <span>➤</span>
        </div>
    </div>

    <script>
        const dishes = [
            {
                name: "Arishta with veal",
                image: "https://images.unsplash.com/photo-1551186970-9c98a5c5d70e?w=600&h=600&fit=crop"
            },
            {
                name: "Linguine with seafood",
                image: "https://images.unsplash.com/photo-1563379926898-05f4575a45d8?w=600&h=600&fit=crop"
            },
            {
                name: "Tagliatelle with truffle and parmesan",
                image: "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=600&h=600&fit=crop"
            },
            {
                name: "Arishta with papkaterev and smoked cheese",
                image: "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=600&h=600&fit=crop"
            }
        ];

        let currentIndex = 0;

        function changeDish(direction) {
            currentIndex += direction;
            
            if (currentIndex < 0) {
                currentIndex = dishes.length - 1;
            } else if (currentIndex >= dishes.length) {
                currentIndex = 0;
            }
            
            updateDish();
        }

        function updateDish() {
            const dish = dishes[currentIndex];
            document.getElementById('dishName').textContent = dish.name;
            document.getElementById('dishImage').src = dish.image;
            
            // Add animation
            const dishName = document.getElementById('dishName');
            dishName.style.animation = 'none';
            setTimeout(() => {
                dishName.style.animation = 'fadeIn 0.6s ease-out';
            }, 10);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                changeDish(-1);
            } else if (e.key === 'ArrowRight') {
                changeDish(1);
            }
        });

        // Touch support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) {
                changeDish(1);
            } else if (touchEndX > touchStartX + 50) {
                changeDish(-1);
            }
        }
    </script>
</body>
</html>
